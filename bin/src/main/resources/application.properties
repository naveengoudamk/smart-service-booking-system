# ==========================================
# Smart Service Booking System - Config
# ==========================================

spring.application.name=servicebooking

# ---- Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/service_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Server ----
server.port=8080

# ---- JWT ----
app.jwt.secret=SmartServiceBookingSystemSecretKey2024VeryLongAndSecureKey!@#$%^
app.jwt.expiration=86400000

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Logging ----
logging.level.com.navi=INFO