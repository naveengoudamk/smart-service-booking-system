<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | ServeEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .booking-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .booking-info h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .booking-meta { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 4px; }
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .status-PENDING { background: #fef3c7; color: #d97706; }
        .status-CONFIRMED { background: #dbeafe; color: #2563eb; }
        .status-IN_PROGRESS { background: #e0e7ff; color: #4f46e5; }
        .status-COMPLETED { background: #d1fae5; color: #059669; }
        .status-CANCELLED, .status-REJECTED { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="/" class="logo">
            <span class="logo-icon">⚡</span><span class="logo-text">Serve<span class="logo-accent">Easy</span></span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="services.html" class="nav-link">Services</a>
        </div>
        <div class="nav-actions">
            <div class="user-menu" style="display:block">
                <button class="user-avatar-btn" id="userAvatarBtn">
                    <span class="user-avatar" id="userAvatarText">U</span>
                    <span id="userNameNav">User</span>
                    <span class="chevron">▾</span>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button class="dropdown-item text-danger" id="logoutBtn">🚪 Logout</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-link active"><span>📋</span> My Bookings</a>
            <a href="services.html" class="sidebar-link"><span>➕</span> Book New</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="dash-header">
            <h1 class="dash-title">My Bookings</h1>
        </div>

        <div id="bookingsList">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = checkAuth();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        if (user.role === 'ADMIN') window.location.href = 'admin.html';
        if (user.role === 'PROVIDER') window.location.href = 'provider.html';
        
        fetchMyBookings();
    });

    async function fetchMyBookings() {
        try {
            const res = await fetch('/api/bookings/my', {
                headers: getAuthHeaders()
            });
            const data = await res.json();
            
            const list = document.getElementById('bookingsList');
            if (data.success) {
                if (data.data.length === 0) {
                    list.innerHTML = `
                        <div class="text-center" style="padding: 40px; background: white; border-radius: 16px;">
                            <h3 style="margin-bottom: 16px;">No bookings yet</h3>
                            <a href="services.html" class="btn btn-primary">Browse Services</a>
                        </div>
                    `;
                    return;
                }
                
                list.innerHTML = data.data.map(b => `
                    <div class="booking-card">
                        <div class="booking-info">
                            <h3>${b.service.name}</h3>
                            <div class="booking-meta">📅 ${b.bookingDate} at ${b.bookingTime}</div>
                            <div class="booking-meta">📍 ${b.address}</div>
                            <div class="booking-meta">💰 ${formatCurrency(b.totalAmount)}</div>
                            ${b.provider ? `<div class="booking-meta">👷 Assigned to: ${b.provider.user.name}</div>` : ''}
                        </div>
                        <div style="text-align: right;">
                            <div class="status-badge status-${b.status}" style="margin-bottom: 16px; display: inline-block;">${b.status.replace('_', ' ')}</div>
                            <br>
                            ${b.status === 'PENDING' ? `<button class="btn btn-outline" style="padding: 6px 16px; font-size: 0.9rem; color: var(--danger); border-color: var(--danger);" onclick="cancelBooking(${b.id})">Cancel</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) {
            document.getElementById('bookingsList').innerHTML = '<p class="text-danger">Failed to load bookings.</p>';
        }
    }

    async function cancelBooking(id) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        
        try {
            const res = await fetch(`/api/bookings/${id}/cancel`, {
                method: 'PATCH',
                headers: getAuthHeaders()
            });
            if (res.ok) {
                fetchMyBookings();
            } else {
                alert('Failed to cancel booking');
            }
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
