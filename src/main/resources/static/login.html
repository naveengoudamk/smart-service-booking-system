<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ServeEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 24px;">
                <span class="logo-icon">⚡</span><span class="logo-text">Serve<span class="logo-accent">Easy</span></span>
            </a>
            <h1 class="auth-title">Welcome Back</h1>
            <p style="color: var(--text-muted);">Enter your credentials to access your account</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div id="authError" class="text-danger" style="margin-bottom: 16px; text-align: center;"></div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginSubmitBtn">Login to Account</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginSubmitBtn');
        btn.innerText = 'Logging in...';
        btn.disabled = true;
        
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };
        
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            
            if (res.ok && data.success) {
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('user', JSON.stringify(data.data));
                
                // Redirect based on role or URL param
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                
                if (redirect) {
                    window.location.href = redirect;
                } else if (data.data.role === 'ADMIN') {
                    window.location.href = 'admin.html';
                } else if (data.data.role === 'PROVIDER') {
                    window.location.href = 'provider.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                document.getElementById('authError').innerText = data.message || 'Invalid credentials';
            }
        } catch (err) {
            document.getElementById('authError').innerText = 'Connection error. Please try again.';
        } finally {
            btn.innerText = 'Login to Account';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
