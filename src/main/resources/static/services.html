<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Services | ServeEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .services-header { padding: 120px 0 60px; background: var(--dark); color: white; text-align: center; }
        .filters { display: flex; gap: 16px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 24px; border-radius: 50px; background: white; border: 1px solid #e2e8f0; cursor: pointer; transition: var(--transition); font-weight: 500; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="/" class="logo">
            <span class="logo-icon">⚡</span><span class="logo-text">Serve<span class="logo-accent">Easy</span></span>
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/" class="nav-link">Home</a>
            <a href="services.html" class="nav-link active">Services</a>
        </div>
        <div class="nav-actions" id="navActions">
            <a href="login.html" class="btn btn-ghost" id="loginBtn">Login</a>
            <a href="register.html" class="btn btn-primary" id="registerBtn">Get Started</a>
            <div class="user-menu" id="userMenu" style="display:none">
                <button class="user-avatar-btn" id="userAvatarBtn">
                    <span class="user-avatar" id="userAvatarText">U</span>
                    <span id="userNameNav">User</span>
                    <span class="chevron">▾</span>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="dashboard.html" class="dropdown-item">📋 My Bookings</a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item text-danger" id="logoutBtn">🚪 Logout</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<section class="services-header">
    <div class="container">
        <h1 class="section-title">Professional Home Services</h1>
        <p class="section-subtitle" style="color:#94a3b8;">Choose from our wide range of trusted experts</p>
    </div>
</section>

<section class="section pt-0">
    <div class="container" style="margin-top: 40px;">
        <div class="filters" id="categoryFilters">
            <button class="filter-btn active" onclick="filterServices('All')">All Services</button>
            <button class="filter-btn" onclick="filterServices('Cleaning')">Cleaning</button>
            <button class="filter-btn" onclick="filterServices('Electrical')">Electrical</button>
            <button class="filter-btn" onclick="filterServices('Plumbing')">Plumbing</button>
            <button class="filter-btn" onclick="filterServices('Appliances')">Appliances</button>
        </div>
        
        <div class="categories-grid" id="servicesList">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </div>
</section>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookingModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeBookingModal()">×</button>
        <h2 id="modalTitle" style="margin-bottom: 24px;">Book Service</h2>
        <form id="bookingForm" onsubmit="submitBooking(event)">
            <input type="hidden" id="serviceId">
            <div class="form-group">
                <label class="form-label">Service Date</label>
                <input type="date" id="bookingDate" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Time Slot</label>
                <input type="time" id="bookingTime" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Full Address</label>
                <textarea id="address" class="form-control" rows="3" required placeholder="House No, Street, City, Landmark"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Special Instructions (Optional)</label>
                <textarea id="notes" class="form-control" rows="2" placeholder="Any specific requirements?"></textarea>
            </div>
            <div id="bookingError" class="text-danger" style="margin-bottom: 16px;"></div>
            <button type="submit" class="btn btn-primary" style="width:100%" id="confirmBookBtn">Confirm Booking</button>
        </form>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/services.js"></script>
</body>
</html>
